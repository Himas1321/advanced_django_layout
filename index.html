<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Проверка плеера</title>
    <link rel="stylesheet" href="font-awesome.min.css">

    <style>
        .player-box {
            width: 800px;
            height: 600px;
            display: flex;
            flex-direction: column;
            background: black;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
        }

        .video-container {
            flex-grow: 1;
        }

        .controls {
            display: flex;
            background: black;
            gap: 15px;
        }

        .control-button {
            border: none;
            cursor: pointer;
            background-color: transparent;
            padding: 12px;
            align-items: center;
            justify-content: center;
        }

        .control-icon {
            color: white;
            font-size: 22px;
        }

        .spacer {
            flex-grow: 1;
        }
    </style>

</head>
<body>

<div class="player-wrapper">
    <div id="player" class="player-box">
        <div class="js-video-container video-container"></div>
        <div class="controls">
            <button class="js-play-button control-button">
                <i class="fa fa-play control-icon" aria-hidden="true"></i>
            </button>
            <button class="js-pause-button control-button" hidden>
                <i class="fa fa-pause control-icon " aria-hidden="true"></i>
            </button>
            <button class="js-mute-button control-button">
                <i class="fa fa-volume-up control-icon" aria-hidden="true"></i>
            </button>
            <button class="js-volume-button control-button" hidden>
                <i class="fa fa-volume-off control-icon" aria-hidden="true"></i>
            </button>
            <div class="spacer"></div>
            <button class="js-fullscreen-button control-button">
                <i class="fa fa-expand control-icon" aria-hidden="true"></i>
            </button>
        </div>
    </div>
</div>


<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
<script src="player.js"></script>

<script type="text/javascript">
    createPlayer({
        elementId: 'player',
        src: 'https://dvmn.org/media/filer_public/d0/16/d016d9b8-4180-4bb9-ad83-0241f61627b8/samsung_demo_-_alive_in_color.mp4'
    });
</script>

</body>
</html>
