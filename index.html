<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Проверка плеера</title>
  <link rel="stylesheet" href="font-awesome.min.css">

  <style>
    .player-wrapper {
    background: black;
    width: 800px;
  }

  .player-box {
    width: 800px;
    height: 600px;
  }

  .video-container {
    width: 100%;
    height: 100%;
  }

  .controls {
    display: flex;
    background: black;
  }

  .control-button {
    border: none;
    cursor: pointer;
    background-color: transparent;
    width: 40px;
    height: 40px;
    align-items: center;
    justify-content: center;
  }

  .control-icon {
    color: white;
  }
  </style>
  
</head>
<body>

<div class="player-wrapper">
  <div id="player" class="player-box">
    <div class="js-video-container video-container"></div>
    <div class="controls">
      <button class="js-play-button control-button">
        <i class="fa fa-play control-icon" aria-hidden="true"></i>
      </button>

      <button class="js-pause-button control-button" hidden>
        <i class="fa fa-pause control-icon " aria-hidden="true"></i>
      </button>
    </div>
  </div>
</div>


  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
  <script src="player.js"></script>

<script type="text/javascript">
  createPlayer({
    elementId: 'player',
    src: 'https://dvmn.org/media/filer_public/d0/16/d016d9b8-4180-4bb9-ad83-0241f61627b8/samsung_demo_-_alive_in_color.mp4'
});
</script>

</body>
</html>
